services:
  bolt:
    image: ghcr.io/stackblitz-labs/bolt.diy:latest
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
      - PORT=5173
      - RUNNING_IN_DOCKER=true
      - OLLAMA_API_BASE_URL=https://ollama.intellicaai.space
      - DEFAULT_NUM_CTX=32768
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npx wrangler pages dev ./build/client --ip 0.0.0.0 --port 5173 --no-show-interactive-dev-session
    restart: unless-stopped
